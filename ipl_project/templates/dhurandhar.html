<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Virat Kohli — CricStats</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#f2f2f2;cursor:none}

/* ── CANVAS (background only) ── */
#bgc{position:fixed;inset:0;z-index:0;display:block;width:100%!important;height:100%!important}

/* ── IMAGE SCENE ── */
#scene{
  position:fixed;inset:0;z-index:1;
  display:flex;align-items:center;justify-content:center;
}
/* Container: same aspect as the photos (approx 1:1.05) */
#img-wrap{
  position:relative;
  width:min(46vw,500px);
  height:min(80vh,750px);
  will-change:transform;
  transform-style:preserve-3d;
}
/* Both images: cover + top-align (face always in upper region) */
.img-layer{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  object-position:center 8%;
  display:block;
  transform:translateZ(0);
  border-radius:4px;
  /* Slight drop shadow for depth */
  filter:drop-shadow(0 20px 60px rgba(0,0,0,.18));
}
/* Reveal layer: clipped, starts hidden */
#img-b{
  clip-path:circle(0px at 50% 40%);
  will-change:clip-path;
}

/* ── CUSTOM CURSOR ── (dot + amoeba ring) */
#c-dot{
  position:fixed;z-index:9999;pointer-events:none;
  width:8px;height:8px;border-radius:50%;background:#c8102e;
  transform:translate(-50%,-50%);
}
/* SVG amoeba cursor ring — updated via JS */
#c-svg{
  position:fixed;z-index:9998;pointer-events:none;
  transform:translate(-50%,-50%);
  overflow:visible;
}

/* ── UI OVERLAY ── */
#ui{position:fixed;inset:0;z-index:200;pointer-events:none}

/* NAV */
.nav{
  position:absolute;top:0;left:0;right:0;
  padding:clamp(18px,2.5vw,34px) clamp(22px,4vw,56px);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{display:flex;align-items:center;gap:13px}
.lbadge{
  width:42px;height:42px;border-radius:50%;background:#c8102e;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',cursive;font-size:16px;color:#fff;letter-spacing:1px;
}
.lname{font-family:'Bebas Neue',cursive;font-size:20px;color:#111;letter-spacing:4px;line-height:1}
.lsub{font-size:8px;font-weight:500;color:rgba(0,0,0,.28);letter-spacing:3px;text-transform:uppercase;margin-top:1px}
.tabs{
  display:flex;gap:3px;background:rgba(255,255,255,.75);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(0,0,0,.07);border-radius:50px;padding:4px;
}
.tab{
  font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  padding:9px 20px;border-radius:46px;color:rgba(0,0,0,.32);
  transition:all .35s cubic-bezier(.4,0,.2,1);
  cursor:pointer;pointer-events:all;user-select:none;
}
.tab.on{background:#c8102e;color:#fff;box-shadow:0 4px 14px rgba(200,16,46,.28)}
.back-btn{
  pointer-events:all;display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:rgba(0,0,0,.28);background:none;border:none;cursor:pointer;
  text-decoration:none;transition:color .3s;
}
.back-btn:hover{color:#c8102e}
.back-btn svg{transition:transform .3s}
.back-btn:hover svg{transform:translateX(-3px)}

/* SIDE STRIPS */
.side-l,.side-r{
  position:absolute;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.side-l{left:clamp(12px,1.8vw,26px)}
.side-r{right:clamp(12px,1.8vw,26px)}
.vl{width:1px;height:44px;background:rgba(0,0,0,.1)}
.vt{
  font-size:7.5px;font-weight:600;color:rgba(0,0,0,.18);
  letter-spacing:3px;text-transform:uppercase;
  writing-mode:vertical-rl;transform:rotate(180deg);
}
.rlbl{
  font-size:7.5px;font-weight:700;color:rgba(0,0,0,.18);
  letter-spacing:3px;text-transform:uppercase;
  writing-mode:vertical-rl;transition:color .4s;
}
.rlbl.on{color:#c8102e}
.rtrack{width:2px;height:66px;background:rgba(0,0,0,.07);border-radius:2px;position:relative;overflow:hidden}
.rfill{
  position:absolute;top:0;left:0;width:100%;height:0%;
  background:linear-gradient(#c8102e,#f5a623);
  border-radius:2px;transition:height .07s;
}

/* BOTTOM */
.bottom{
  position:absolute;bottom:0;left:0;right:0;
  padding:clamp(18px,2.5vw,36px) clamp(22px,4vw,56px);
  display:flex;align-items:flex-end;justify-content:space-between;
}
.pname{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(46px,6.5vw,96px);
  color:rgba(0,0,0,.065);letter-spacing:3px;line-height:.88;
  pointer-events:none;user-select:none;
}
.srow{display:flex;align-items:center;margin-top:12px}
.sb{padding:0 clamp(10px,1.5vw,20px)}
.sb:first-child{padding-left:0}
.sv{font-family:'Bebas Neue',cursive;font-size:clamp(16px,1.8vw,26px);color:#111;letter-spacing:1px;line-height:1}
.sk{font-size:7px;font-weight:500;color:rgba(0,0,0,.28);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.ss{width:1px;height:24px;background:rgba(0,0,0,.1)}
.rteam{text-align:right}
.rtname{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:3px;color:rgba(0,0,0,.18)}
.rdots{display:flex;gap:4px;justify-content:flex-end;margin-top:5px}
.rd{width:7px;height:7px;border-radius:50%;background:#c8102e}
.rd.g{background:#f5a623}

/* LOADING */
#load{
  position:fixed;inset:0;z-index:9000;background:#f2f2f2;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity .9s ease;
}
#load.out{opacity:0;pointer-events:none}
.ln{font-family:'Bebas Neue',cursive;font-size:50px;color:#111;letter-spacing:10px}
.ls{font-size:9px;font-weight:500;color:rgba(0,0,0,.3);letter-spacing:4px;text-transform:uppercase}
.lt{width:150px;height:1px;background:rgba(0,0,0,.08)}
.lp{height:1px;background:#c8102e;width:0%;transition:width .25s}
</style>
</head>
<body>

<div id="load">
  <div class="ln">VIRAT KOHLI</div>
  <div class="ls">Loading Experience</div>
  <div class="lt"><div class="lp" id="lp"></div></div>
</div>

<canvas id="bgc"></canvas>

<div id="scene">
  <div id="img-wrap">
    <img id="img-a" class="img-layer" src="" alt="Virat — India">
    <img id="img-b" class="img-layer" src="" alt="Virat — RCB">
  </div>
</div>

<!-- Amoeba cursor SVG -->
<div id="c-dot"></div>
<svg id="c-svg" width="260" height="260" viewBox="-130 -130 260 260">
  <circle id="c-ring" cx="0" cy="0" r="110"
    fill="none" stroke="rgba(200,16,46,0.35)" stroke-width="1.2"/>
</svg>

<div id="ui">
  <nav class="nav">
    <div class="logo">
      <div class="lbadge">IPL</div>
      <div><div class="lname">CricStats</div><div class="lsub">IPL Analytics Hub</div></div>
    </div>
    <div class="tabs">
      <div class="tab on" id="t-a">India</div>
      <div class="tab"    id="t-b">RCB</div>
    </div>
    <a href="index.html" class="back-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </nav>

  <div class="side-l"><div class="vl"></div><div class="vt">Move to Reveal</div><div class="vl"></div></div>
  <div class="side-r">
    <div class="rlbl on" id="rl-a">India</div>
    <div class="rtrack"><div class="rfill" id="rfill"></div></div>
    <div class="rlbl" id="rl-b">RCB</div>
  </div>

  <div class="bottom">
    <div>
      <div class="pname">VIRAT<br>KOHLI</div>
      <div class="srow">
        <div class="sb"><div class="sv">8,004</div><div class="sk">IPL Runs</div></div>
        <div class="ss"></div>
        <div class="sb"><div class="sv">252</div><div class="sk">Matches</div></div>
        <div class="ss"></div>
        <div class="sb"><div class="sv">37.84</div><div class="sk">Average</div></div>
        <div class="ss"></div>
        <div class="sb"><div class="sv">131</div><div class="sk">SR</div></div>
        <div class="ss"></div>
        <div class="sb"><div class="sv">8</div><div class="sk">100s</div></div>
      </div>
    </div>
    <div class="rteam">
      <div class="rtname">Royal Challengers Bengaluru</div>
      <div class="rdots"><div class="rd"></div><div class="rd g"></div></div>
    </div>
  </div>
</div>

/* ═══════════════════════════════════════════
   THREE.JS BACKGROUND
   Framer CursorLens-style:
   • Light grey bg (#f2f2f2)
   • ~11 large organic blob OUTLINES (not filled)
   • Blob colour A1A1A1 (thin stroke, no fill)
   • They float slowly, continuously animated
═══════════════════════════════════════════ */
const bgCanvas  = document.getElementById('bgc');
const renderer  = new THREE.WebGLRenderer({canvas:bgCanvas,antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);

const bgScene  = new THREE.Scene();
const bgCamera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const uRes     = {value:new THREE.Vector2(window.innerWidth,window.innerHeight)};
const uTime    = {value:0};
const uMouse   = {value:new THREE.Vector2(.5,.5)};

const BG_VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`;

/* Framer CursorLens background:
   - White/very-light background
   - Floating organic contour-outline blobs (outline only, no fill, A1A1A1)
   - Each blob is a warped circle with multiple concentric rings inside
   - Very slow drift animation */
const BG_FRAG=`
precision highp float;
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;
varying vec2  vUv;

float hash(vec2 p){p=fract(p*vec2(127.1,311.7));p+=dot(p,p+45.32);return fract(p.x*p.y);}
float noise(vec2 p){
  vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);
  return mix(mix(hash(i),hash(i+vec2(1,0)),u.x),
             mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),u.x),u.y);
}
float fbm(vec2 p){
  float v=0.,a=.5;
  for(int i=0;i<5;i++){v+=a*(noise(p)-.5)*2.;p=p*2.03+vec2(1.7,9.2);a*=.5;}
  return v;
}

/* One organic blob outline: multiple concentric rings, warped shape */
float blobOutline(vec2 uv, vec2 center, float baseR, float wobble, float tOff, float rings){
  vec2 asp=vec2(uRes.x/uRes.y,1.);
  /* Slow float */
  vec2 drift=vec2(sin(uTime*.09+tOff)*0.07, cos(uTime*.07+tOff)*0.05);
  vec2 d=(uv-center-drift)*asp;
  float dist=length(d);
  /* Organic shape warp */
  float angle=atan(d.y,d.x);
  float warp=fbm(vec2(cos(angle)*1.8+uTime*.04+tOff,sin(angle)*1.8))*wobble;
  float r=dist+warp;
  /* Draw several concentric ring outlines */
  float line=0.;
  float step=0.038;
  for(float i=0.;i<rings;i++){
    float ring=baseR+i*step;
    float w=smoothstep(.007,.0,abs(r-ring));
    line=max(line,w);
  }
  return line;
}

void main(){
  /* Background: Framer default #F2F2F2 */
  vec3 col=vec3(.949,.949,.949);

  /* Slight gradient */
  col+=vec3(.008,.007,.006)*(1.-vUv.y*.6);

  /* === 11 BLOBS (Framer default count=11) === */
  /* Parameters: center, baseRadius, wobble, timeOffset, ringCount */
  float b=0.;

  b=blobOutline(vUv,vec2(.78,.38),.22,.14,0.0,5.);  col-=b*vec3(.212,.212,.212)*.65;
  b=blobOutline(vUv,vec2(.20,.30),.15,.12,1.3,4.);  col-=b*vec3(.212,.212,.212)*.55;
  b=blobOutline(vUv,vec2(.55,.70),.18,.16,2.6,4.);  col-=b*vec3(.212,.212,.212)*.60;
  b=blobOutline(vUv,vec2(.10,.65),.12,.10,3.9,3.);  col-=b*vec3(.212,.212,.212)*.50;
  b=blobOutline(vUv,vec2(.88,.72),.14,.11,5.2,3.);  col-=b*vec3(.212,.212,.212)*.48;
  b=blobOutline(vUv,vec2(.40,.15),.11,.09,6.5,3.);  col-=b*vec3(.212,.212,.212)*.45;
  b=blobOutline(vUv,vec2(.65,.88),.13,.12,7.8,3.);  col-=b*vec3(.212,.212,.212)*.45;
  b=blobOutline(vUv,vec2(.92,.22),.10,.08,9.1,2.);  col-=b*vec3(.212,.212,.212)*.40;
  b=blobOutline(vUv,vec2(.05,.82),.09,.10,10.4,2.); col-=b*vec3(.212,.212,.212)*.38;
  b=blobOutline(vUv,vec2(.32,.55),.16,.13,11.7,4.); col-=b*vec3(.212,.212,.212)*.52;
  b=blobOutline(vUv,vec2(.72,.18),.11,.09,13.0,3.); col-=b*vec3(.212,.212,.212)*.42;

  gl_FragColor=vec4(clamp(col,0.,1.),1.);
}`;

const bgMat=new THREE.ShaderMaterial({
  vertexShader:BG_VERT,fragmentShader:BG_FRAG,
  uniforms:{uRes:uRes,uTime:uTime,uMouse:uMouse}
});
bgScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2),bgMat));

/* ═══════════════════════════════════════════
   AMOEBA CURSOR (SVG path, regenerated each frame)
   Framer CursorLens: cursor complexity=0.8 → organic shape
   Uses sum of sinusoids on polar coordinates
═══════════════════════════════════════════ */
const cSvg  = document.getElementById('c-svg');
const cRing = document.getElementById('c-ring');
const cDot  = document.getElementById('c-dot');

const BASE_R   = 110;  // px — Framer cursor size=120 → r=110
const COMPLEXITY = 0.8;
const N_POINTS = 64;

/* Generate organic polar path */
function amoebaPath(t, rx, ry, cx, cy){
  const pts=[];
  const k=COMPLEXITY;
  for(let i=0;i<N_POINTS;i++){
    const a=(i/N_POINTS)*Math.PI*2;
    /* Sum of harmonics for organic shape */
    const warp=
      Math.sin(a*3+t*.7 )*0.10*k +
      Math.sin(a*5+t*.5 )*0.07*k +
      Math.cos(a*7+t*.9 )*0.05*k +
      Math.sin(a*2+t*.3 )*0.08*k +
      Math.cos(a*4-t*.6 )*0.06*k;
    const r=BASE_R*(1+warp);
    pts.push([Math.cos(a)*r, Math.sin(a)*r]);
  }
  /* Build smooth SVG path */
  let d=`M${pts[0][0].toFixed(1)},${pts[0][1].toFixed(1)}`;
  for(let i=1;i<=N_POINTS;i++){
    const p=pts[i%N_POINTS];
    const pp=pts[(i-1+N_POINTS)%N_POINTS];
    const pn=pts[(i+1)%N_POINTS];
    const cpx=(pp[0]+p[0])/2, cpy=(pp[1]+p[1])/2;
    d+=`L${p[0].toFixed(1)},${p[1].toFixed(1)}`;
  }
  d+='Z';
  return d;
}

/* Use SVG filter for smooth blob (feTurbulence approach — more organic) */
/* Instead, build actual smooth path via catmull-rom */
function catmullRomPath(t){
  const pts=[];
  const k=COMPLEXITY;
  for(let i=0;i<N_POINTS;i++){
    const a=(i/N_POINTS)*Math.PI*2;
    const warp=
      Math.sin(a*2+t*.35)*0.12*k +
      Math.sin(a*3-t*.55)*0.09*k +
      Math.cos(a*5+t*.4 )*0.06*k +
      Math.sin(a*7+t*.25)*0.04*k;
    const r=BASE_R*(1+warp);
    pts.push([Math.cos(a)*r, Math.sin(a)*r]);
  }
  const n=pts.length;
  let d=`M${pts[0][0].toFixed(2)},${pts[0][1].toFixed(2)}`;
  for(let i=0;i<n;i++){
    const p0=pts[(i-1+n)%n];
    const p1=pts[i];
    const p2=pts[(i+1)%n];
    const p3=pts[(i+2)%n];
    const cp1x=p1[0]+(p2[0]-p0[0])/6;
    const cp1y=p1[1]+(p2[1]-p0[1])/6;
    const cp2x=p2[0]-(p3[0]-p1[0])/6;
    const cp2y=p2[1]-(p3[1]-p1[1])/6;
    d+=`C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2[0].toFixed(2)},${p2[1].toFixed(2)}`;
  }
  return d+'Z';
}

/* Build or update the SVG path element */
let svgPath=null;
function ensurePath(){
  if(!svgPath){
    svgPath=document.createElementNS('http://www.w3.org/2000/svg','path');
    svgPath.setAttribute('fill','none');
    svgPath.setAttribute('stroke','rgba(200,16,46,0.38)');
    svgPath.setAttribute('stroke-width','1.3');
    cSvg.appendChild(svgPath);
    cRing.style.display='none'; // hide the static circle
  }
}

/* Polygon clip-path string for CSS (amoeba reveal) */
function amoebaClip(cx, cy, t, containerRect){
  const k=COMPLEXITY;
  const pts=[];
  for(let i=0;i<N_POINTS;i++){
    const a=(i/N_POINTS)*Math.PI*2;
    const warp=
      Math.sin(a*2+t*.35)*0.12*k +
      Math.sin(a*3-t*.55)*0.09*k +
      Math.cos(a*5+t*.4 )*0.06*k +
      Math.sin(a*7+t*.25)*0.04*k;
    const r=revealR*(1+warp);
    // Point in screen pixels
    const px=cx+Math.cos(a)*r;
    const py=cy+Math.sin(a)*r;
    // Convert to % relative to image container
    const px2=((px-containerRect.left)/containerRect.width*100).toFixed(2);
    const py2=((py-containerRect.top) /containerRect.height*100).toFixed(2);
    pts.push(`${px2}% ${py2}%`);
  }
  return `polygon(${pts.join(',')})`;
}

/* ═══════════════════════════════════════════
   POINTER TRACKING
═══════════════════════════════════════════ */
const target  ={x:.5,y:.5};
const smooth  ={x:.5,y:.5};
const ringPos ={x:.5,y:.5};
const vel     ={x:0, y:0};
let   prev    ={x:.5,y:.5};
let   idleT   =0;
let   overImg =false;
let   curX    =window.innerWidth*.5;
let   curY    =window.innerHeight*.5;
let   curSmX  =curX, curSmY=curY;
let   curRingX=curX, curRingY=curY;

function setXY(el,x,y){el.style.left=x+'px';el.style.top=y+'px';}

function onMove(cx,cy){
  const nx=cx/window.innerWidth, ny=cy/window.innerHeight;
  vel.x=(nx-prev.x)*55; vel.y=(ny-prev.y)*55;
  prev.x=nx; prev.y=ny;
  target.x=nx; target.y=ny;
  curX=cx; curY=cy;
  idleT=0;
  setXY(cDot,cx,cy);

  const r=wrap.getBoundingClientRect();
  overImg=(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom);

  if(overImg){
    const pct=((cx-r.left)/r.width*100).toFixed(1);
    document.getElementById('rfill').style.height=pct+'%';
    const left=(cx-r.left)<r.width*.5;
    document.getElementById('rl-a').classList.toggle('on',left);
    document.getElementById('rl-b').classList.toggle('on',!left);
    document.getElementById('t-a').classList.toggle('on',left);
    document.getElementById('t-b').classList.toggle('on',!left);
  }
}
window.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
window.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  uRes.value.set(window.innerWidth,window.innerHeight);
});

/* ═══════════════════════════════════════════
   RENDER LOOP
═══════════════════════════════════════════ */
function lerp(a,b,t){return a+(b-a)*t}

function lissajous(t,a){
  return{x:Math.sin(t*.38)*Math.cos(t*.21)*a, y:Math.cos(t*.29)*Math.sin(t*.17)*a};
}

let revealR  =0;   // current reveal radius px
let tiltX    =0,tiltY=0,scaleV=1;
let rippleT  =0;

function tick(ts){
  requestAnimationFrame(tick);
  const t=ts*.001;

  idleT+=.016;
  const idle=Math.min(idleT/3,1);

  /* Smooth cursor — Framer viscosity=1 → moderate lag */
  curSmX=lerp(curSmX,curX,.085);
  curSmY=lerp(curSmY,curY,.085);

  /* Ring cursor lags behind more */
  curRingX=lerp(curRingX,curX,.045);
  curRingY=lerp(curRingY,curY,.045);

  /* Position SVG cursor */
  ensurePath();
  cSvg.style.left=curRingX+'px';
  cSvg.style.top =curRingY+'px';

  /* Amoeba path — organic mutation over time */
  const path=catmullRomPath(t);
  svgPath.setAttribute('d',path);

  /* ── REVEAL RADIUS ── */
  /* Framer cursor size=120 → base radius 110px */
  /* Speed boost from Framer ripple: fast mouse = bigger reveal */
  const spd=Math.sqrt(vel.x*vel.x+vel.y*vel.y);
  const speedBoost=Math.min(spd*30,40);
  rippleT=lerp(rippleT,speedBoost,.2); rippleT*=.88;

  const targetR=overImg ? (110+rippleT) : 0;
  revealR=lerp(revealR,targetR,.07);

  /* ── CSS CLIP-PATH (amoeba shape) ── */
  if(revealR>1){
    const r=wrap.getBoundingClientRect();
    const clip=amoebaClip(curSmX,curSmY,t,r);
    imgB.style.clipPath=clip;
    imgB.style.opacity='1';
  } else {
    imgB.style.clipPath='circle(0px at 50% 40%)';
    imgB.style.opacity='0';
  }

  /* ── 3D PARALLAX TILT (Framer IMG 3D depth=6) ── */
  smooth.x=lerp(smooth.x,target.x,.07);
  smooth.y=lerp(smooth.y,target.y,.07);
  const tx=(smooth.x-.5)*5;
  const ty=(smooth.y-.5)*-3.5;
  const sw=lissajous(t,1.4*idle);
  tiltX=lerp(tiltX,tx+sw.x,.04);
  tiltY=lerp(tiltY,ty+sw.y,.04);
  const ts2=overImg?1.015:1.0;
  scaleV=lerp(scaleV,ts2,.04);
  wrap.style.transform=`perspective(900px) rotateY(${tiltX.toFixed(3)}deg) rotateX(${tiltY.toFixed(3)}deg) scale(${scaleV.toFixed(4)})`;

  /* ── BACKGROUND ── */
  uTime.value=t;
  uMouse.value.set(smooth.x,smooth.y);
  renderer.render(bgScene,bgCamera);

  /* velocity decay */
  vel.x*=.55;vel.y*=.55;
}

requestAnimationFrame(tick);
})();
</script>
